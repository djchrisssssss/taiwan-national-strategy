name: Validate Repository

on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      run_live_url_audit:
        description: Run the live URL audit in addition to local consistency checks
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 18 * * 0"

permissions:
  contents: read

jobs:
  validate-local:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validator dependencies
        run: python -m pip install --upgrade pip jsonschema

      - name: Run local consistency validation
        run: python scripts/validate_repository.py

  validate-live-urls:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_live_url_audit)
    needs: validate-local
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validator dependencies
        run: python -m pip install --upgrade pip jsonschema

      - name: Run live URL audit
        run: python scripts/validate_repository.py --check-urls --enforce-url-status --url-timeout 8
